version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: appointment_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: appointment_db
    ports:
      - "3306:3306"
    volumes:
      - ../database.sql:/docker-entrypoint-initdb.d/database.sql

  backend:
    build:
      context: ..
      dockerfile: AppiomentBookingSystem1/Dockerfile
    container_name: appointment_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/appointment_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - app-network

  frontend:
    image: node:20
    container_name: appointment_frontend
    working_dir: /app
    volumes:
      - ../AppointmentBookingSys/appointment-booking:/app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080
    command: sh -c "npm install && npm start"
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge
