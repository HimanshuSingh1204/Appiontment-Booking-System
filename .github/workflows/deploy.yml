name: Full Stack Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build backend and frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: AppiomentBookingSystem1
        run: |
          chmod +x ./mvnw
          ./mvnw clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: AppointmentBookingSys/appointment-booking
        run: npm ci

      - name: Build frontend
        working-directory: AppointmentBookingSys/appointment-booking
        run: npm run build

  deploy-backend:
    name: Deploy backend to Railway
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g railway
      - name: Deploy backend
        env:
          RAILWAY_API_KEY: ${{ secrets.RAILWAY_API_KEY }}
        run: |
          railway login --apiKey "$RAILWAY_API_KEY"
          cd AppiomentBookingSystem1
          railway up --deploy --projectId "${{ secrets.RAILWAY_PROJECT_ID }}" --serviceId "${{ secrets.RAILWAY_SERVICE_ID }}"

  deploy-frontend:
    name: Deploy frontend to Vercel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v23
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: AppointmentBookingSys/appointment-booking
          vercel-args: '--prod'
